set_config:
  name: Set config
  description: Update runtime settings for a Personal Wakeup entity.
  fields:
    entity_id:
      name: Wakeup entity
      description: Target Personal Wakeup sensor entity.
      selector:
        entity:
          integration: personal_wakeup
          domain: sensor
          multiple: false
    enabled:
      name: Enabled
      description: Enable or disable the alarm schedule.
      selector:
        boolean:
    time_of_day:
      name: Alarm time
      description: Local time when the alarm should fire.
      selector:
        time:
    fade_duration:
      name: Fade duration
      description: Light fade duration in seconds.
      selector:
        number:
          min: 1
          max: 7200
          mode: box
          unit_of_measurement: seconds
    volume:
      name: Volume
      description: Target playback volume from 0.0 to 1.0.
      selector:
        number:
          min: 0
          max: 1
          step: 0.05
          mode: slider
    playlist:
      name: Playlist
      description: Playlist URI or identifier configured for this wakeup.
      selector:
        text:
    require_home:
      name: Require home
      description: Only run automatically when the configured person is home.
      selector:
        boolean:

trigger_now:
  name: Trigger now
  description: Start the wakeup routine immediately.
  fields:
    entity_id:
      name: Wakeup entity
      description: Target Personal Wakeup sensor entity.
      selector:
        entity:
          integration: personal_wakeup
          domain: sensor
          multiple: false
